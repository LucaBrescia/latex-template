<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">

  <!-- EMI Box -->
  <rect x="200" y="30" width="110" height="50" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="255" y="58" font-family="serif" font-size="22" font-weight="bold" text-anchor="middle" dominant-baseline="middle">EMI</text>
  
  <!-- Left Box: "sull'ingresso" -->
  <rect x="110" y="110" width="140" height="60" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="180" y="140" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">sull'ingresso</text>
  
  <!-- Right Box: "sulle alimentazioni" -->
  <rect x="265" y="110  " width="140" height="60" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="335" y="130" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">sulle</text>
  <text x="335" y="150" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">alimentazioni</text>
  
  <!-- Bottom Left Box: "progettazione ad HOC" -->
  <rect x="110" y="200" width="140" height="60" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="180" y="225" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">progettazione ad</text>
  <text x="180" y="245" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">HOC</text>
  
  <!-- Bottom Right Box: "filtraggio" -->
  <rect x="265" y="200" width="140" height="60" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="335" y="230" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">filtraggio</text>
  
  <!-- Connection Lines -->
  <!-- EMI to sull'ingresso -->
  <line x1="255" y1="80" x2="255" y2="95" stroke="#3D5895" stroke-width="1.5"/>
  <line x1="250" y1="95" x2="180" y2="95" stroke="#3D5895" stroke-width="1.5"/>
  <line x1="180" y1="95" x2="180" y2="110" stroke="#3D5895" stroke-width="1.5"/>
  
  <!-- EMI to sulle alimentazioni -->
  <line x1="250" y1="95" x2="335" y2="95" stroke="#3D5895" stroke-width="1.5"/>
  <line x1="335" y1="95" x2="335" y2="110" stroke="#3D5895" stroke-width="1.5"/>
  
  <!-- sull'ingresso to progettazione ad HOC -->
  <line x1="180" y1="170" x2="180" y2="200" stroke="#3D5895" stroke-width="1.5"/>
  
  <!-- sulle alimentazioni to filtraggio -->
  <line x1="335" y1="170" x2="335" y2="200" stroke="#3D5895" stroke-width="1.5"/>
  
</svg>