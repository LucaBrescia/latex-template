<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="105 20 305 150" xmlns="http://www.w3.org/2000/svg">

  <!-- EMI Box -->
  <rect x="185" y="25" width="140" height="55" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="255" y="48" font-family="serif" font-size="16" font-weight="bold" text-anchor="middle" dominant-baseline="middle">PROPAGAZIONE</text>
  <text x="255" y="64" font-family="serif" font-size="16" font-weight="bold" text-anchor="middle" dominant-baseline="middle">EMI</text>
  
  <!-- Left Box: "sull'ingresso" -->
  <rect x="110" y="110" width="140" height="55" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="180" y="140" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">RADIAZIONE</text>
  
  <!-- Right Box: "sulle alimentazioni" -->
  <rect x="265" y="110  " width="140" height="55" fill="white" stroke="#000" stroke-width="1.5"/>
  <text x="335" y="140" font-family="serif" font-size="16" text-anchor="middle" dominant-baseline="middle">CONDUZIONE</text>
  

  
  <!-- Connection Lines -->
  <!-- EMI to sull'ingresso -->
  <line x1="255" y1="80" x2="255" y2="95" stroke="#3D5895" stroke-width="1.5"/>
  <line x1="250" y1="95" x2="180" y2="95" stroke="#3D5895" stroke-width="1.5"/>
  <line x1="180" y1="95" x2="180" y2="110" stroke="#3D5895" stroke-width="1.5"/>
  
  <!-- EMI to sulle alimentazioni -->
  <line x1="250" y1="95" x2="335" y2="95" stroke="#3D5895" stroke-width="1.5"/>
  <line x1="335" y1="95" x2="335" y2="110" stroke="#3D5895" stroke-width="1.5"/>  
</svg>